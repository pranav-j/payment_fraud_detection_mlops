# Pre-commit hooks run automatically before every git commit.
# Install: uv run pre-commit install
# Run manually on all files: uv run pre-commit run --all-files

repos:
  # Strip notebook outputs — keeps diffs small, prevents secret leaks via cell output
  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout

  # Lint and format Python code
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Detect accidentally committed secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: ^(\.env\.example|notebooks/.*\.ipynb)$

  # Generic hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1000"]  # Block files over 1MB — usually data committed by mistake
      - id: check-merge-conflict
      - id: check-toml
